name: Tag and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "lib/mathematical/version.rb"

permissions:
  contents: write

jobs:
  # Create a git tag when version.rb changes
  tag:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          version=$(ruby -e 'load "lib/mathematical/version.rb"; puts Mathematical::VERSION')
          echo "version=v${version}" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git tag "$version"; then
            git push origin "$version"
            gh release create "$version" --generate-notes
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag already exists"
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

  # Build and release native gems (triggered by tag or manual dispatch)
  build-and-release:
    if: always() && (github.event_name == 'workflow_dispatch' || needs.tag.outputs.tag_created == 'true')
    needs: [tag]
    uses: ./.github/workflows/build-native-gems.yml
    with:
      publish: true
    permissions:
      contents: write
      id-token: write
